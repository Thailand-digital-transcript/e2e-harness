# demo/docker-compose.public.yml — the public, pull-only demo. Standalone: run
# this file ALONE, not layered with docker-compose.yml or any other overlay.
#
#   git clone --depth 1 https://github.com/Thailand-digital-transcript/e2e-harness
#   cd e2e-harness
#   docker compose -f demo/docker-compose.public.yml up
#
# Every service below is a published ghcr.io/thailand-digital-transcript image
# pinned to :v0.1.0 — nothing is built from source, no JDK/Maven required. The
# clone supplies only four small config files: infra/postgres/init.sh,
# infra/csc/seed.sql, demo/seed.sh, and the fixture XML — see the design spec
# (docs/superpowers/specs/2026-07-09-public-demo-images-design.md) for why
# those four can't be baked into an image without three more repos to publish.
#
# Bind-mount paths below are relative to THIS file's directory (demo/), not
# the repo root — Compose resolves relative volume paths against the
# directory of the first (here, only) -f file. docker-compose.yml's own
# bind mounts use root-relative paths (./infra/..., ./demo/seed.sh) because
# that file always runs with itself listed first in a multi -f chain, making
# the repo root the project directory. This file runs alone, so copying a
# path string verbatim from docker-compose.yml is wrong here — confirmed the
# hard way: `docker compose config --quiet` validates YAML syntax only, never
# checks that a bind-mount source path actually exists, so this broke silently
# until a real `up` was tried against a fresh clone.

volumes:
  csc-keystores:

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    volumes:
      - ../infra/postgres/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "4L6g3nShT-eMCtK--X86sw"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: ghcr.io/thailand-digital-transcript/transcript-keycloak:v0.1.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://localhost:8080
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /realms/transcript HTTP/1.1\\r\\nHost: localhost:8080\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | head -n1 | grep -q 200"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  keystore-init:
    image: ghcr.io/thailand-digital-transcript/keystore-init:v0.1.0
    environment:
      KEYSTORE_OUTPUT_DIR: /out
    volumes:
      - csc-keystores:/out
    restart: "no"

  csc:
    image: ghcr.io/thailand-digital-transcript/eidasremotesigning:v0.1.0
    depends_on:
      postgres:
        condition: service_healthy
      keystore-init:
        condition: service_completed_successfully
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/eidasremotesigning
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      PKCS11_ENABLED: "false"
      SPRING_CLOUD_DISCOVERY_ENABLED: "false"
    volumes:
      - csc-keystores:/app/keystores:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/actuator/health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 90s

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/transcripts &&
        mc mb --ignore-existing local/signed-transcripts &&
        mc mb --ignore-existing local/transcript-pdfs &&
        echo 'Buckets ready'
      "
    restart: "no"

  csc-seed:
    image: postgres:16
    depends_on:
      csc:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    volumes:
      - ../infra/csc/seed.sql:/seed.sql:ro
    entrypoint: >
      /bin/sh -c "
        psql -h postgres -U postgres -d eidasremotesigning -f /seed.sql &&
        echo 'CSC seed complete'
      "
    restart: "no"

  transcript-processing:
    image: ghcr.io/thailand-digital-transcript/transcript-processing:v0.1.0
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: transcript_processing
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BROKERS: kafka:9092
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: signed-transcripts
      SECURITY_ENABLED: "false"
      RATE_LIMIT_ENABLED: "false"
      KAFKA_CONSUMER_AUTO_STARTUP: "true"
      OUTBOX_RELAY_ENABLED: "true"
      SPRING_CLOUD_DISCOVERY_ENABLED: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8085/actuator/health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 90s

  transcript-orchestrator:
    image: ghcr.io/thailand-digital-transcript/transcript-orchestrator:v0.1.0
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      keycloak:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: transcript_orchestrator
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BROKERS: kafka:9092
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_XML_BUCKET: signed-transcripts
      KEYCLOAK_ISSUER: http://localhost:8080/realms/transcript
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/transcript/protocol/openid-connect/certs
      CORS_ALLOWED_ORIGINS: http://localhost:8081
      OUTBOX_RELAY_ENABLED: "true"
      SPRING_CLOUD_DISCOVERY_ENABLED: "false"
    ports:
      - "8095:8095"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8095/actuator/health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 90s

  transcript-signing:
    image: ghcr.io/thailand-digital-transcript/transcript-signing:v0.1.0
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      # Mirrors docker-compose.yml: signing's S3StorageAdapter needs the
      # signed-transcripts bucket to exist, so it waits on minio-init too.
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      csc:
        condition: service_healthy
      csc-seed:
        condition: service_completed_successfully
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: transcript_signing
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BROKERS: kafka:9092
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      CSC_SERVICE_URL: http://csc:9000
      CSC_TOKEN_URL: http://csc:9000/oauth2/token
      CSC_CLIENT_ID: e2e-client
      CSC_CLIENT_SECRET: "e2e-signing-secret"
      CSC_REGISTRAR_CREDENTIAL_ID: e2e-registrar-cred
      CSC_REGISTRAR_PIN: e2e-registrar-2024
      CSC_DEAN_CREDENTIAL_ID: e2e-dean-cred
      CSC_DEAN_PIN: e2e-dean-2024
      CSC_SEAL_CREDENTIAL_ID: e2e-seal-cred
      CSC_SEAL_PIN: e2e-seal-2024
      OUTBOX_RELAY_ENABLED: "true"
      SPRING_CLOUD_DISCOVERY_ENABLED: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8088/actuator/health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 90s

  transcript-pdf-generation:
    image: ghcr.io/thailand-digital-transcript/transcript-pdf-generation:v0.1.0
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: transcript_pdf_generation
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BROKERS: kafka:9092
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      OUTBOX_RELAY_ENABLED: "true"
      SPRING_CLOUD_DISCOVERY_ENABLED: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8090/actuator/health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 90s

  transcript-approval-ui:
    image: ghcr.io/thailand-digital-transcript/transcript-approval-ui:v0.1.0
    depends_on:
      transcript-orchestrator:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "8081:80"

  demo-seed:
    image: alpine:3.20
    depends_on:
      transcript-processing:
        condition: service_healthy
      transcript-orchestrator:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      PROCESSING_URL: http://transcript-processing:8085
      ORCHESTRATOR_URL: http://transcript-orchestrator:8095
      KEYCLOAK_URL: http://keycloak:8080
      CLIENT_SECRET: e2e-dev-secret
      INSTITUTION_CODE: "01110"
      FIXTURE_PATH: /fixtures/input.xml
    volumes:
      - ./seed.sh:/seed.sh:ro
      - ../src/test/resources/fixtures/Transcript_v2.0.xml:/fixtures/input.xml:ro
    entrypoint: ["/bin/sh", "-c", "apk add --no-cache bash curl jq >/dev/null && bash /seed.sh"]
    restart: "no"
