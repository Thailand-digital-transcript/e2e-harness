name: release-keystore-init

on:
  push:
    branches: [master]
    tags: ['v*']
    paths:
      - 'src/main/**'
      - 'pom.xml'
      - 'Dockerfile.keystore-init'
      - '.github/workflows/release-keystore-init.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Package
        run: mvn -B -q package -Dmaven.test.skip=true

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image for verification
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.keystore-init
          load: true
          tags: verify:local

      - name: Verify image
        run: ./.github/verify-image-keystore-init.sh verify:local

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/thailand-digital-transcript/keystore-init
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern=v{{version}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.keystore-init
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
