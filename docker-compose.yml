version: "3.8"

# ─── Phase 1: Infrastructure ─────────────────────────────────────────────────

services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    volumes:
      - ./infra/postgres/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "4L6g3nShT-eMCtK--X86sw"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Phase 2: CSC + one-shot seeders ───────────────────────────────────────

  csc:
    build:
      context: ./services/eidasremotesigning
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/eidasremotesigning
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      PKCS11_ENABLED: "false"
      SPRING_CLOUD_DISCOVERY_ENABLED: "false"
    volumes:
      - ./infra/csc/keystores:/app/keystores:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/actuator/health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 90s

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/transcripts &&
        mc mb --ignore-existing local/signed-transcripts &&
        mc mb --ignore-existing local/transcript-pdfs &&
        echo 'Buckets ready'
      "
    restart: "no"

  csc-seed:
    image: postgres:16
    depends_on:
      csc:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    volumes:
      - ./infra/csc/seed.sql:/seed.sql:ro
    entrypoint: >
      /bin/sh -c "
        psql -h postgres -U postgres -d eidasremotesigning -f /seed.sql &&
        echo 'CSC seed complete'
      "
    restart: "no"

  # ─── Phase 3: Transcript services ──────────────────────────────────────────
  # All depend on postgres+kafka+minio healthy and minio-init complete.

  transcript-processing:
    build:
      context: ./services/transcript-processing
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: transcript_processing
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BROKERS: kafka:9092
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      SECURITY_ENABLED: "false"
      RATE_LIMIT_ENABLED: "false"
      KAFKA_CONSUMER_AUTO_STARTUP: "true"
      SPRING_CLOUD_DISCOVERY_ENABLED: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8085/actuator/health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 90s

  transcript-orchestrator:
    build:
      context: ./services/transcript-orchestrator
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: transcript_orchestrator
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BROKERS: kafka:9092
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      # Override: processing uploads to 'transcripts'; orchestrator default is 'transcript-xmls'
      S3_XML_BUCKET: transcripts
      ORCHESTRATOR_API_KEYS: "************"
      OUTBOX_RELAY_ENABLED: "true"
      SPRING_CLOUD_DISCOVERY_ENABLED: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8095/actuator/health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 90s

  transcript-signing:
    build:
      context: ./services/transcript-signing
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      csc:
        condition: service_healthy
      csc-seed:
        condition: service_completed_successfully
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: transcript_signing
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BROKERS: kafka:9092
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      CSC_SERVICE_URL: http://csc:9000
      CSC_TOKEN_URL: http://csc:9000/oauth2/token
      CSC_CLIENT_ID: e2e-client
      CSC_CLIENT_SECRET: "******************"
      CSC_REGISTRAR_CREDENTIAL_ID: e2e-registrar-cred
      CSC_REGISTRAR_PIN: e2e-registrar-2024
      CSC_DEAN_CREDENTIAL_ID: e2e-dean-cred
      CSC_DEAN_PIN: e2e-dean-2024
      CSC_SEAL_CREDENTIAL_ID: e2e-seal-cred
      CSC_SEAL_PIN: e2e-seal-2024
      OUTBOX_RELAY_ENABLED: "true"
      SPRING_CLOUD_DISCOVERY_ENABLED: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8088/actuator/health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 90s

  transcript-pdf-generation:
    build:
      context: ./services/transcript-pdf-generation
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: transcript_pdf_generation
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BROKERS: kafka:9092
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      OUTBOX_RELAY_ENABLED: "true"
      SPRING_CLOUD_DISCOVERY_ENABLED: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8090/actuator/health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 90s
